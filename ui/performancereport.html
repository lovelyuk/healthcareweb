<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="nav_performance_report">Health Check - Performance Report</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/dashboard.css">
    <link rel="stylesheet" href="/ui/health-check.css?v=20260307">
    <link rel="stylesheet" href="/ui/sidebar.css?v=1" />
    <script src="/settings.js"></script>
    <style>
        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 24px;
            padding: 24px;
        }

        .perf-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .perf-card-header {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .perf-card-title {
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        .perf-visual-area {
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .perf-canvas-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 4 / 3;
            background: #000;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .perf-canvas-container canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .perf-data-card {
            margin: 0 16px 16px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .perf-stats-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .perf-value-group {
            display: flex;
            flex-direction: column;
        }

        .perf-value-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 4px;
        }

        .perf-value-big {
            font-size: 32px;
            font-weight: 800;
            color: white;
            line-height: 1;
        }

        .perf-value-big span {
            font-size: 16px;
            color: #94a3b8;
            font-weight: 400;
            margin-left: 4px;
        }

        .perf-gauge-area {
            width: 80px;
            height: 80px;
            position: relative;
        }

        .perf-comment-box {
            padding: 12px 16px;
            background: rgba(0, 199, 253, 0.1);
            border: 1px solid rgba(0, 199, 253, 0.2);
            border-radius: 12px;
            color: #e2e8f0;
            font-size: 13px;
            line-height: 1.5;
        }

        .tag-pill {
            font-size: 10px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            color: #cbd5e1;
        }
    </style>
    <script src="/ui/user-context.js" defer></script>
    <script src="/ui/sidebar.js" defer></script>
</head>

<body class="dashboard-page">
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-3"></div>
    </div>

    <aside class="sidebar">
        <div class="brand-header">
            <div class="logo-icon">
                <img src="/logo.svg" alt="보듬케어 로고" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <span class="brand-text" data-i18n="brand_name">보듬케어</span>
        </div>

                <nav class="nav-menu">
            <a href="/dashboard.html" class="nav-item">
                <i class="fa-solid fa-chart-pie"></i>
                <span data-i18n="nav_dash">Dashboard</span>
            </a>
            <a href="/statistics.html" class="nav-item">
                <i class="fa-solid fa-chart-line"></i>
                <span data-i18n="nav_stats">Statistics</span>
            </a>

            <div class="nav-item has-dropdown">
                <div class="dropdown-trigger">
                    <i class="fa-solid fa-heart-pulse"></i>
                    <span data-i18n="nav_health">Health Check</span>
                    <i class="fa-solid fa-chevron-down chevron"></i>
                </div>
                <div class="submenu">
                    <a href="/ui/health-check.html" class="submenu-item" data-i18n="nav_bodycheck">bodycheck</a>
                    <a href="/ui/anthropometry.html" class="submenu-item"
                        data-i18n="nav_anthropometry">anthropometry</a>
                    <a href="/ui/rom.html" class="submenu-item" data-i18n="nav_rom">rom</a>
                    <a href="/ui/mobilityreport.html" class="submenu-item" data-i18n="nav_mobility">ROM Report</a>
                    <a href="/ui/movement.html" class="submenu-item" data-i18n="nav_movement">Performance Analysis</a>
                    <a href="/ui/performancereport.html" class="submenu-item" data-i18n="nav_perf">performancereport</a>
                    <a href="/ui/history.html" class="submenu-item" data-i18n="nav_history">history</a>
                </div>
            </div>

            <a href="/prescription.html" class="nav-item">
                <i class="fa-solid fa-prescription-bottle-medical"></i>
                <span data-i18n="nav_presc">Prescriptions</span>
            </a>
        </nav>

        <div class="sidebar-controls"
            style="margin-top: auto; padding: 0 16px 16px; display: flex; gap: 10px; justify-content: center;">
            <button id="themeToggleBtn" class="icon-btn" aria-label="Toggle Theme"
                style="background: rgba(255,255,255,0.05); color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.1); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; transition: all 0.2s;">
                <i class="fa-solid fa-moon"></i>
            </button>
            <button id="langToggleBtn" class="icon-btn" aria-label="Toggle Language"
                style="background: rgba(255,255,255,0.05); color: var(--text-secondary); border: 1px solid rgba(255,255,255,0.1); width: 36px; height: 36px; border-radius: 50%; cursor: pointer; transition: all 0.2s; font-weight: 600; font-size: 12px;">
                KO
            </button>
        </div>

        <div class="user-profile">
            <div class="avatar">
                <img src="https://ui-avatars.com/api/?name=Alex+Doe&background=0071C5&color=fff&size=100"
                    alt="User Profile">
            </div>
            <div class="user-info">
                <h4 id="user-display-email">Alex Doe</h4>
                <p data-i18n="nav_plan">Standard Plan</p>
            </div>
            <button class="logout-btn" aria-label="Logout" onclick="window.location.href='/index.html'">
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </button>
        </div>
    </aside>

    <main class="dashboard-main">
        <div class="top-status-bar"
            style="padding: 20px 30px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1 style="color: white; font-size: 24px; font-weight: 800; margin-bottom: 4px;"
                    data-i18n="rp_perf_title">Performance Report</h1>
                <p id="subjectDisplay" style="color: #94a3b8; font-size: 14px;" data-i18n="rp_perf_sub">최근 운동 능력 측정 결과
                    요약</p>
            </div>
        </div>

        <div id="reportContainer" class="report-grid">
            <!-- Loading state -->
            <div class="loading-state" style="grid-column: 1/-1; text-align: center; padding: 100px;">
                <i class="fa-solid fa-spinner fa-spin" style="font-size: 32px; color: var(--intel-cyan);"></i>
                <p style="margin-top: 16px; color: #94a3b8;" data-i18n="rp_analyzing">데이터를 분석 중입니다...</p>
            </div>
        </div>
    </main>

    <script src="/ui/lib/api.js"></script>
    <script src="performancereport.js"></script>
</body>

</html>
